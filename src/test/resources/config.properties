# Default browser: chrome | firefox | edge | safari
browser=chrome

# Run headless (true/false)
headless=false

# Application under test
#base.url=https://ww.google.com
base.url=https://hbsp.harvard.edu/home/

# Timeouts (seconds)
implicit.wait=5
explicit.wait=15
page.load.timeout=30

# Screenshot on failure
screenshot.on.failure=true
screenshot.dir=target/screenshots